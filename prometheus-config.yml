global:
  scrape_interval:     10s
  evaluation_interval: 10s

  external_labels:
    monitor: 'prom-monitor'

rule_files:
  - 'rules/*.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'alertmanager:9093'

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'node-metric'
    scrape_interval: 5s
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'container-metric'
    static_configs:
      - targets: ['cadvisor:8080']
