"compose.yml" 30L, 596B                                                                                                                            7,34          All
services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres_db
    volumes:
      #- db_data:/var/lib/postgresql/data
      - ./data:/var/lib/postgresql
    ports:
      - 127.0.0.1:5432:5432
    networks:
      db-net:
        ipv4_address: 10.1.0.2
    env_file: ".dbenv"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 400M
        reservations:
          cpus: '0.25'
          memory: 300M

networks:
  db-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.0.0/24
          gateway: 10.1.0.1